name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Create launcher script
        run: |
          cat > build/linux/x64/release/bundle/lanshare.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          export LD_LIBRARY_PATH="$SCRIPT_DIR/lib:$LD_LIBRARY_PATH"
          exec "$SCRIPT_DIR/lan_share" "$@"
          EOF
          chmod +x build/linux/x64/release/bundle/lanshare.sh

      - name: Package tar.gz
        run: |
          cd build/linux/x64/release
          tar czf LANShare-linux-x64.tar.gz --transform='s|^bundle|LANShare|' bundle/

      - uses: actions/upload-artifact@v4
        with:
          name: LANShare-linux-x64
          path: build/linux/x64/release/LANShare-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "LANShare-windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: LANShare-windows-x64
          path: LANShare-windows-x64.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/LANShare-linux-x64/LANShare-linux-x64.tar.gz
            artifacts/LANShare-windows-x64/LANShare-windows-x64.zip
          generate_release_notes: true

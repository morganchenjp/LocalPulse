name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Create launcher script
        run: |
          printf '#!/bin/bash\nSCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"\nexport LD_LIBRARY_PATH="$SCRIPT_DIR/lib:$LD_LIBRARY_PATH"\nexec "$SCRIPT_DIR/local_pulse" "$@"\n' > build/linux/x64/release/bundle/localpulse.sh
          chmod +x build/linux/x64/release/bundle/localpulse.sh

      - name: Package tar.gz
        run: |
          cd build/linux/x64/release
          tar czf LocalPulse-linux-x64.tar.gz --transform='s|^bundle|LocalPulse|' bundle/

      - uses: actions/upload-artifact@v5
        with:
          name: LocalPulse-linux-x64
          path: build/linux/x64/release/LocalPulse-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "LocalPulse-windows-x64.zip"

      - uses: actions/upload-artifact@v5
        with:
          name: LocalPulse-windows-x64
          path: LocalPulse-windows-x64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      - name: Package ZIP
        run: |
          cd build/macos/Build/Products/Release
          zip -r LocalPulse-macos-x64.zip lanpulse.app

      - uses: actions/upload-artifact@v5
        with:
          name: LocalPulse-macos-x64
          path: build/macos/Build/Products/Release/LocalPulse-macos-x64.zip

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/LocalPulse-linux-x64/LocalPulse-linux-x64.tar.gz
            artifacts/LocalPulse-windows-x64/LocalPulse-windows-x64.zip
            artifacts/LocalPulse-macos-x64/LocalPulse-macos-x64.zip
          generate_release_notes: true

name: lan_share
description: "LAN file sharing, instant messaging, and clipboard sync tool."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Network - Server
  shelf: ^1.4.2
  shelf_router: ^1.1.4

  # Network - Client
  dio: ^5.7.0

  # Device discovery (supports Linux/Windows/macOS/Android/iOS)
  bonsoir: ^6.0.2

  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Clipboard (using Flutter built-in Clipboard from services.dart)

  # Theme
  flex_color_scheme: ^8.1.0

  # Desktop window management
  window_manager: ^0.4.3

  # Utilities
  uuid: ^4.5.1
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.3.4
  crypto: ^3.0.6
  mime: ^2.0.0
  file_picker: ^8.1.6
  url_launcher: ^6.3.1
  logger: ^2.5.0
  collection: ^1.19.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  freezed: ^2.5.8
  json_serializable: ^6.9.0
  drift_dev: ^2.22.1

flutter:
  uses-material-design: true
